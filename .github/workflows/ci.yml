name: CI

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".golangci.yml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "desktop/**"
      - "ui/**"
      - "**/*.go"
      - "Dockerfile*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".golangci.yml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "desktop/**"
      - "ui/**"
      - "**/*.go"
      - "Dockerfile*"

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "24"
  WAILS_VERSION: "v3.0.0-alpha.74"

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          check-latest: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev
          pkg-config --modversion gtk+-3.0 webkit2gtk-4.1 libsoup-3.0

      - name: Install Wails v3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Install deps
        run: make deps
      - name: Build
        run: make build
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7
      - name: lint
        run: make pre-commit
      - name: Test
        run: make test
