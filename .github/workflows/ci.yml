name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".golangci.yml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "desktop/**"
      - "ui/**"
      - "**/*.go"
      - "Dockerfile*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".golangci.yml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "desktop/**"
      - "ui/**"
      - "**/*.go"
      - "Dockerfile*"

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  ci:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux desktop analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev
          pkg-config --modversion gtk+-3.0 webkit2gtk-4.1 libsoup-3.0

      - name: Install dependencies
        run: |
          pnpm --dir ui install --frozen-lockfile
          go mod download

      - name: UI lint
        run: pnpm --dir ui run lint

      - name: UI build
        run: pnpm --dir ui run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2

      - name: Test
        run: |
          go test -v ./...
          pnpm --dir ui run test
