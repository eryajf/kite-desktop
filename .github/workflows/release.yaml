name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "24"
  WAILS_VERSION: "v3.0.0-alpha.74"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

  desktop-build:
    name: Desktop ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            label: macos-intel
            platform: macos
            arch: amd64
            package_suffix: macos-intel.dmg
          - os: macos-15
            label: macos-apple-silicon
            platform: macos
            arch: arm64
            package_suffix: macos-apple-silicon.dmg
          - os: windows-latest
            label: windows-amd64
            platform: windows
            arch: amd64
            package_suffix: windows-amd64-installer.exe
          - os: windows-latest
            label: windows-arm64
            platform: windows
            arch: arm64
            package_suffix: windows-arm64-installer.exe
          - os: ubuntu-24.04
            label: linux-amd64
            platform: linux
            arch: amd64
            package_suffix: linux-amd64.AppImage
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          check-latest: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install Linux build dependencies
        if: ${{ matrix.platform == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libfuse2t64 \
            rpm
          pkg-config --modversion gtk+-3.0 webkit2gtk-4.1 libsoup-3.0

      - name: Install Wails v3
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Prepare desktop metadata
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/release/update_desktop_metadata.sh
          scripts/release/update_desktop_metadata.sh \
            "${{ needs.prepare.outputs.version }}" \
            "${{ github.server_url }}/${{ github.repository }}"

      - name: Install macOS packaging tools
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          set -euo pipefail
          brew install create-dmg

      - name: Install Windows packaging tools
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build macOS package
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cd desktop
          wails3 task darwin:package ARCH=${{ matrix.arch }}
          cd bin
          APP_PATH="kite.app"
          if [[ ! -d "${APP_PATH}" ]]; then
            echo "missing ${APP_PATH}" >&2
            exit 1
          fi
          create-dmg \
            --volname "Kite Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "kite.app" 200 190 \
            --hide-extension "kite.app" \
            --app-drop-link 600 185 \
            "Kite-${{ needs.prepare.outputs.tag_name }}-${{ matrix.package_suffix }}" \
            "${APP_PATH}"
          mv "Kite-${{ needs.prepare.outputs.tag_name }}-${{ matrix.package_suffix }}" ../../release-assets/

      - name: Build Windows installer
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Set-Location desktop
          wails3 task windows:create:nsis:installer ARCH=${{ matrix.arch }}
          $source = "bin/kite-${{ matrix.arch }}-installer.exe"
          if (!(Test-Path $source)) {
            Write-Error "missing installer: $source"
            exit 1
          }
          Copy-Item -LiteralPath $source -Destination "../release-assets/Kite-${{ needs.prepare.outputs.tag_name }}-${{ matrix.package_suffix }}" -Force

      - name: Build Linux packages
        if: ${{ matrix.platform == 'linux' }}
        shell: bash
        env:
          GIT_COMMITTER_NAME: Kite Release Bot
          GIT_COMMITTER_EMAIL: kite-release-bot@users.noreply.github.com
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cd desktop
          wails3 task linux:build ARCH=${{ matrix.arch }}
          wails3 task linux:create:appimage ARCH=${{ matrix.arch }}
          wails3 task linux:generate:deb ARCH=${{ matrix.arch }}
          wails3 task linux:generate:rpm ARCH=${{ matrix.arch }}

          APPIMAGE_FILE="$(find bin -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          DEB_FILE="$(find bin -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          RPM_FILE="$(find bin -maxdepth 1 -type f -name '*.rpm' | head -n 1)"

          if [[ -z "${APPIMAGE_FILE}" || -z "${DEB_FILE}" || -z "${RPM_FILE}" ]]; then
            echo "linux packages are incomplete" >&2
            ls -la bin >&2 || true
            exit 1
          fi

          cp "${APPIMAGE_FILE}" "../release-assets/Kite-${{ needs.prepare.outputs.tag_name }}-${{ matrix.package_suffix }}"
          cp "${DEB_FILE}" "../release-assets/Kite-${{ needs.prepare.outputs.tag_name }}-linux-amd64.deb"
          cp "${RPM_FILE}" "../release-assets/Kite-${{ needs.prepare.outputs.tag_name }}-linux-amd64.rpm"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.label }}
          path: release-assets/*
          retention-days: 1

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - desktop-build
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f -printf '%P\n' | LC_ALL=C sort | xargs sha256sum > SHA256SUMS

      - name: Build release notes header
        id: release_header
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.prepare.outputs.tag_name }}"
          REPOSITORY="${{ github.repository }}"
          RELEASE_BASE_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}"

          emit_row() {
            local platform="$1"
            local architecture="$2"
            local package_type="$3"
            local filename="$4"

            if [[ -f "release-assets/${filename}" ]]; then
              printf '| %s | %s | %s | [`%s`](%s/%s) |\n' \
                "${platform}" "${architecture}" "${package_type}" "${filename}" "${RELEASE_BASE_URL}" "${filename}"
            fi
          }

          {
            echo 'header<<EOF'
            echo '## Downloads'
            echo
            echo '| Platform | Architecture | Package | Download |'
            echo '| --- | --- | --- | --- |'
            emit_row "Windows" "x64" "Installer" "Kite-${TAG_NAME}-windows-amd64-installer.exe"
            emit_row "Windows" "ARM64" "Installer" "Kite-${TAG_NAME}-windows-arm64-installer.exe"
            emit_row "macOS" "Intel" "DMG" "Kite-${TAG_NAME}-macos-intel.dmg"
            emit_row "macOS" "Apple Silicon" "DMG" "Kite-${TAG_NAME}-macos-apple-silicon.dmg"
            emit_row "Linux" "x64" "AppImage" "Kite-${TAG_NAME}-linux-amd64.AppImage"
            emit_row "Linux" "x64" "DEB" "Kite-${TAG_NAME}-linux-amd64.deb"
            emit_row "Linux" "x64" "RPM" "Kite-${TAG_NAME}-linux-amd64.rpm"
            echo
            if [[ -f release-assets/SHA256SUMS ]]; then
              echo '## Checksums'
              echo
              echo "- [SHA256SUMS](${RELEASE_BASE_URL}/SHA256SUMS)"
              echo
            fi
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Draft release notes
        id: draft_release_notes
        uses: release-drafter/release-drafter@v7
        with:
          tag: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.release_name }}
          version: ${{ needs.prepare.outputs.version }}
          header: ${{ steps.release_header.outputs.header }}
          config-name: release-drafter.yml
          dry-run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge preserved draft notes
        id: release_notes
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_HEADER: ${{ steps.release_header.outputs.header }}
          FALLBACK_BODY: ${{ steps.draft_release_notes.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const tagName = process.env.TAG_NAME;
            const fallbackBody = process.env.FALLBACK_BODY || "";
            const releaseHeader = (process.env.RELEASE_HEADER || "").trim();

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const existingRelease = releases.find((release) => release.tag_name === tagName);
            const preservedBody = existingRelease?.body?.trim() ? existingRelease.body : fallbackBody;

            const stripManagedSections = (body) => {
              const lines = (body || "").split(/\r?\n/);
              const kept = [];
              let skippingManagedSection = false;

              for (const line of lines) {
                const trimmed = line.trim();

                if (/^## (Downloads|Checksums)$/.test(trimmed)) {
                  skippingManagedSection = true;
                  continue;
                }

                if (skippingManagedSection && /^##\s+/.test(trimmed)) {
                  skippingManagedSection = false;
                }

                if (!skippingManagedSection) {
                  kept.push(line);
                }
              }

              return kept.join("\n").trim();
            };

            const mergedBody = [releaseHeader, stripManagedSections(preservedBody)]
              .filter(Boolean)
              .join("\n\n")
              .trim();

            core.setOutput("body", `${mergedBody}\n`);

      - name: Write release notes
        shell: bash
        env:
          RELEASE_NOTES: ${{ steps.release_notes.outputs.body }}
        run: |
          set -euo pipefail
          printf '%s\n' "${RELEASE_NOTES}" > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.release_name }}
          draft: false
          prerelease: false
          make_latest: true
          body_path: release-notes.md
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
