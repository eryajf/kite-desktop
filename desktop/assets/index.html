<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kite Desktop Shell</title>
    <style>
      :root {
        color: #f4f7fb;
        background:
          radial-gradient(circle at top, rgba(88, 129, 255, 0.28), transparent 44%),
          linear-gradient(160deg, #07111f 0%, #10233a 48%, #0b1728 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        padding: 32px 28px;
        border-radius: 24px;
        background: rgba(7, 17, 31, 0.64);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 30px 80px rgba(2, 8, 23, 0.45);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.14);
        color: #cdd6e5;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 42px;
        line-height: 1;
      }

      p {
        margin: 0;
        color: rgba(226, 232, 240, 0.86);
        font-size: 16px;
        line-height: 1.6;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 24px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.18);
        color: #b8f0e6;
        font-size: 14px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 0 6px rgba(52, 211, 153, 0.16);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Kite Desktop Shell</span>
      <h1>Kite</h1>
      <p>正在启动内嵌后端，并接入本地桌面宿主能力。</p>
      <div class="status">
        <span class="dot"></span>
        本地桌面壳已就绪
      </div>
    </main>
  </body>
</html>
